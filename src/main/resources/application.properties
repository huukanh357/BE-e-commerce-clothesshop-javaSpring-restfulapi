spring.application.name=spring-restapi-clothesshop

# Database (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/clothesshoprestfulapi?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
jwt.secret=0123456789abcdefghijklmnopqrstuvwxyz0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ
jwt.access-token-expiration=86400000
jwt.refresh-expiration=604800000

# File upload
app.upload.base-dir=uploads
app.upload.max-file-size=5242880
app.upload.allowed-extensions=jpg,jpeg,png,gif,webp,pdf
app.upload.allowed-folders=products,avatars

# Seed data: set true for first run only, then switch back to false
app.seed-data=true

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=60000ms
app.cache.ttl-minutes=5

# Rate limiting (Redis)
app.rate-limit.enabled=true
app.rate-limit.max-requests=100
app.rate-limit.window-seconds=60
